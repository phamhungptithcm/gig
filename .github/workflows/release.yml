name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || (github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]'))
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release candidate
        run: go test ./...

      - name: Resolve release metadata
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          previous_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          next_tag="$(./scripts/next-release-tag.sh)"
          should_release="true"

          if gh release view "$next_tag" >/dev/null 2>&1; then
            should_release="false"
          fi

          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

      - name: Build release archives
        if: steps.metadata.outputs.should_release == 'true'
        run: ./scripts/build-release-assets.sh "${{ steps.metadata.outputs.next_tag }}" dist

      - name: Generate package manager files
        if: steps.metadata.outputs.should_release == 'true'
        run: ./scripts/generate-package-manager-files.sh "${{ steps.metadata.outputs.next_tag }}" dist

      - name: Generate release notes
        if: steps.metadata.outputs.should_release == 'true'
        run: |
          ./scripts/release-notes.sh \
            "${{ steps.metadata.outputs.previous_tag }}" \
            "${{ steps.metadata.outputs.next_tag }}" > release-notes.md

      - name: Publish GitHub release
        if: steps.metadata.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.metadata.outputs.next_tag }}" \
            dist/* \
            --title "${{ steps.metadata.outputs.next_tag }}" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA"

      - name: Open package manager metadata PR
        if: steps.metadata.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --short -- Formula/gig-cli.rb bucket/gig-cli.json)" ]; then
            exit 0
          fi

          branch="release/package-managers-${{ steps.metadata.outputs.next_tag }}"
          title="chore(release): update package manager metadata for ${{ steps.metadata.outputs.next_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$branch"
          git add Formula/gig-cli.rb bucket/gig-cli.json
          git commit -m "$title [skip release]"
          git push --force-with-lease --set-upstream origin "$branch"

          pr_url="$(gh pr list --head "$branch" --base main --state open --json url --jq '.[0].url // empty')"
          if [ -n "$pr_url" ]; then
            exit 0
          fi

          pr_body="$(cat <<EOF
          ## Summary
          - refresh Homebrew and Scoop metadata for ${{ steps.metadata.outputs.next_tag }}
          - generated automatically after publishing the GitHub release

          ## Notes
          - merge this PR to publish the updated Formula and Scoop manifest in-repo
          - commit is marked [skip release] so it will not trigger a follow-up release
          EOF
          )"

          gh pr create \
            --base main \
            --head "$branch" \
            --title "$title" \
            --body "$pr_body"
