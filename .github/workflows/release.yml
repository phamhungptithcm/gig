name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    if: github.event_name == 'workflow_dispatch' || (github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]'))
    runs-on: ubuntu-latest
    outputs:
      previous_tag: ${{ steps.metadata.outputs.previous_tag }}
      next_tag: ${{ steps.metadata.outputs.next_tag }}
      should_release: ${{ steps.metadata.outputs.should_release }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Resolve release metadata
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          previous_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          next_tag="$(./scripts/next-release-tag.sh)"
          should_release="true"

          if gh release view "$next_tag" >/dev/null 2>&1; then
            should_release="false"
          fi

          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

  verify:
    needs: metadata
    if: needs.metadata.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      npm_publish_mode: ${{ steps.npm_publish_mode.outputs.mode }}
      npm_package_exists: ${{ steps.npm_publish_mode.outputs.package_exists }}
      npm_publish_reason: ${{ steps.npm_publish_mode.outputs.reason }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate Go release candidate
        run: go test ./...

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Validate npm package staging
        run: |
          node --check npm/bin/gig.cjs
          node --check npm/install.cjs
          node --check scripts/prepare-npm-package.cjs
          bash -n scripts/resolve-npm-publish-mode.sh
          node scripts/prepare-npm-package.cjs "${{ needs.metadata.outputs.next_tag }}" dist/npm-package
          npm pack --dry-run ./dist/npm-package

      - name: Resolve npm publish mode
        id: npm_publish_mode
        env:
          NPM_TRUSTED_PUBLISHING: ${{ vars.NPM_TRUSTED_PUBLISHING }}
          NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
          GIG_NPM_REQUIRE_MODE: "true"
        run: ./scripts/resolve-npm-publish-mode.sh "@phamhungptithcm/gig"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Validate docs
        run: |
          pip install -r requirements-docs.txt
          mkdocs build --strict

  publish_release:
    needs:
      - metadata
      - verify
    if: needs.metadata.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: github-release

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archives
        run: ./scripts/build-release-assets.sh "${{ needs.metadata.outputs.next_tag }}" dist

      - name: Generate release notes
        run: |
          ./scripts/release-notes.sh \
            "${{ needs.metadata.outputs.previous_tag }}" \
            "${{ needs.metadata.outputs.next_tag }}" > release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.metadata.outputs.next_tag }}" \
            dist/* \
            --title "${{ needs.metadata.outputs.next_tag }}" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA"

  publish_npm:
    needs:
      - metadata
      - verify
      - publish_release
    if: needs.metadata.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm-release

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Prepare npm package
        run: |
          node scripts/prepare-npm-package.cjs "${{ needs.metadata.outputs.next_tag }}" dist/npm-package
          npm pack --dry-run ./dist/npm-package

      - name: Publish npm package with trusted publishing
        if: needs.verify.outputs.npm_publish_mode == 'trusted'
        run: npm publish ./dist/npm-package --access public

      - name: Publish npm package with automation token
        if: needs.verify.outputs.npm_publish_mode == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: npm publish ./dist/npm-package --access public

      - name: Verify published npm package version
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.next_tag }}
          PACKAGE_NAME: "@phamhungptithcm/gig"
        run: |
          expected_version="$(node -e '
            const tag = String(process.env.RELEASE_TAG || "").trim();
            const match = tag.match(/^v(\d{4})\.(\d{2})\.(\d{2})$/);
            if (!match) {
              console.error(`invalid release tag: ${tag}`);
              process.exit(1);
            }
            console.log(`${match[1]}.${Number(match[2])}.${Number(match[3])}`);
          ')"
          published_version="$(npm view "${PACKAGE_NAME}" version --registry=https://registry.npmjs.org)"
          if [ "${published_version}" != "${expected_version}" ]; then
            echo "Published npm version ${published_version} did not match expected ${expected_version}." >&2
            exit 1
          fi
          echo "Published ${PACKAGE_NAME}@${published_version}"
