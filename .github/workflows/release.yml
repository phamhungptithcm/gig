name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to resume or publish, for example v2026.04.14
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    if: github.event_name == 'workflow_dispatch' || (github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]'))
    runs-on: ubuntu-latest
    outputs:
      previous_tag: ${{ steps.metadata.outputs.previous_tag }}
      next_tag: ${{ steps.metadata.outputs.next_tag }}
      source_ref: ${{ steps.metadata.outputs.source_ref }}
      release_exists: ${{ steps.metadata.outputs.release_exists }}
      npm_version_exists: ${{ steps.metadata.outputs.npm_version_exists }}
      should_release: ${{ steps.metadata.outputs.should_release }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Resolve release metadata
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          REQUESTED_RELEASE_TAG: ${{ inputs.release_tag }}
          PACKAGE_NAME: "@hunpeolabs/gig"
          REGISTRY_URL: "https://registry.npmjs.org/"
        run: |
          requested_tag="$(printf '%s' "${REQUESTED_RELEASE_TAG:-}" | tr -d '[:space:]')"
          source_ref="${GITHUB_SHA_VALUE}"

          if [ -n "${requested_tag}" ] && [[ ! "${requested_tag}" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            echo "workflow_dispatch release_tag must use vYYYY.MM.DD." >&2
            exit 1
          fi

          next_tag="${requested_tag:-$(./scripts/next-release-tag.sh)}"

          previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -Fxv "${next_tag}" | head -n 1 || true)"
          IFS='.' read -r year month day <<< "${next_tag#v}"
          expected_npm_version="${year}.$((10#${month})).$((10#${day}))"
          npm_version_exists="false"
          if npm view "${PACKAGE_NAME}@${expected_npm_version}" version --registry="${REGISTRY_URL}" >/dev/null 2>&1; then
            npm_version_exists="true"
          fi

          should_release="true"
          release_exists="false"

          if gh release view "$next_tag" >/dev/null 2>&1; then
            release_exists="true"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${requested_tag}" ] && [ "${release_exists}" != "true" ]; then
            echo "workflow_dispatch release_tag only supports retrying an existing GitHub release." >&2
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${release_exists}" = "true" ]; then
            should_release="false"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -z "${requested_tag}" ] && [ "${release_exists}" = "true" ]; then
            should_release="false"
            echo "Release ${next_tag} already exists." >&2
            echo "To resume npm publish for an existing release, re-run this workflow with release_tag=${next_tag}." >&2
          fi

          if [ "${release_exists}" = "true" ] && [ "${npm_version_exists}" = "true" ]; then
            should_release="false"
          fi

          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"
          echo "release_exists=$release_exists" >> "$GITHUB_OUTPUT"
          echo "npm_version_exists=$npm_version_exists" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

  verify:
    needs: metadata
    if: needs.metadata.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      npm_publish_mode: ${{ steps.npm_publish_mode.outputs.mode }}
      npm_package_exists: ${{ steps.npm_publish_mode.outputs.package_exists }}
      npm_publish_reason: ${{ steps.npm_publish_mode.outputs.reason }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.metadata.outputs.source_ref }}

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate Go release candidate
        run: go test ./...

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Validate npm package staging
        run: |
          node --check npm/bin/gig.cjs
          node --check npm/install.cjs
          node --check scripts/prepare-npm-package.cjs
          bash -n scripts/resolve-npm-publish-mode.sh scripts/verify-npm-publish-auth.sh scripts/publish-npm-package.sh
          node scripts/prepare-npm-package.cjs "${{ needs.metadata.outputs.next_tag }}" dist/npm-package
          npm pack --dry-run ./dist/npm-package

      - name: Resolve npm publish mode
        id: npm_publish_mode
        env:
          NPM_TRUSTED_PUBLISHING: ${{ vars.NPM_TRUSTED_PUBLISHING }}
          NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
          GIG_NPM_REQUIRE_MODE: "true"
        run: ./scripts/resolve-npm-publish-mode.sh "@hunpeolabs/gig"

      - name: Validate npm token publish auth
        if: steps.npm_publish_mode.outputs.mode == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: ./scripts/verify-npm-publish-auth.sh "@hunpeolabs/gig"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Validate docs
        run: |
          pip install -r requirements-docs.txt
          mkdocs build --strict

  publish_release:
    needs:
      - metadata
      - verify
      - publish_npm
    if: needs.metadata.outputs.should_release == 'true' && needs.metadata.outputs.release_exists != 'true' && (needs.publish_npm.result == 'success' || needs.publish_npm.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: github-release

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ needs.metadata.outputs.source_ref }}

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archives
        run: ./scripts/build-release-assets.sh "${{ needs.metadata.outputs.next_tag }}" dist

      - name: Generate release notes
        run: |
          ./scripts/release-notes.sh \
            "${{ needs.metadata.outputs.previous_tag }}" \
            "${{ needs.metadata.outputs.next_tag }}" > release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target_commit="$(git rev-parse HEAD)"
          gh release create "${{ needs.metadata.outputs.next_tag }}" \
            dist/* \
            --title "${{ needs.metadata.outputs.next_tag }}" \
            --notes-file release-notes.md \
            --target "${target_commit}"

  publish_npm:
    needs:
      - metadata
      - verify
    if: needs.metadata.outputs.should_release == 'true' && needs.metadata.outputs.npm_version_exists != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm-release

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.metadata.outputs.source_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Prepare npm package
        run: |
          node scripts/prepare-npm-package.cjs "${{ needs.metadata.outputs.next_tag }}" dist/npm-package
          npm pack --dry-run ./dist/npm-package

      - name: Publish npm package with trusted publishing
        if: needs.verify.outputs.npm_publish_mode == 'trusted'
        run: ./scripts/publish-npm-package.sh ./dist/npm-package

      - name: Publish npm package with automation token
        if: needs.verify.outputs.npm_publish_mode == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: ./scripts/publish-npm-package.sh ./dist/npm-package

      - name: Verify published npm package version
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.next_tag }}
          PACKAGE_NAME: "@hunpeolabs/gig"
        run: |
          expected_version="$(node -e '
            const tag = String(process.env.RELEASE_TAG || "").trim();
            const match = tag.match(/^v(\d{4})\.(\d{2})\.(\d{2})$/);
            if (!match) {
              console.error(`invalid release tag: ${tag}`);
              process.exit(1);
            }
            console.log(`${match[1]}.${Number(match[2])}.${Number(match[3])}`);
          ')"
          published_version="$(npm view "${PACKAGE_NAME}" version --registry=https://registry.npmjs.org)"
          if [ "${published_version}" != "${expected_version}" ]; then
            echo "Published npm version ${published_version} did not match expected ${expected_version}." >&2
            exit 1
          fi
          echo "Published ${PACKAGE_NAME}@${published_version}"
